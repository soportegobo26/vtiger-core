# =============================================================================
# vtiger-core/apache/vtiger.conf
# VirtualHost principal para vtiger CRM
# AllowOverride All es CRITICO para que .htaccess funcione
# =============================================================================

ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerAdmin webmaster@localhost

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Seguridad: bloquear acceso a directorios sensibles
        <FilesMatch "\.(log|sql|sh|rar|zip|gz|bak)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Bloquear acceso directo a carpetas internas
    <DirectoryMatch "^/var/www/html/(cache|logs|storage|migrations)">
        Require all denied
    </DirectoryMatch>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Headers de seguridad
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Compresion
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
    </IfModule>

    # Cache de assets estaticos
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/png  "access plus 1 month"
        ExpiresByType image/gif  "access plus 1 month"
        ExpiresByType text/css   "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </IfModule>
</VirtualHost>