name: Build Core Image

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - 'config/**'
      - 'apache/**'
      - 'vtiger-source/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forzar rebuild aunque no haya cambios'
        required: false
        default: 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify build success
        if: success()
        run: |
          echo "Core image publicada exitosamente"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Los repos cliente deben actualizar su FROM para usar la nueva version:"
          echo "  FROM ghcr.io/soportegobo26/vtiger-core:latest"

      - name: Notify build failure
        if: failure()
        run: |
          echo "::error::Error en el build del core. Revisar los logs del step anterior."